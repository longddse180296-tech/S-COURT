name: BE CI

on:
  push:
    branches:
      - main
      - release
      - LongDev
    paths:
      - 'BE/**'
      - '.github/workflows/be-ci.yml'
  pull_request:
    branches:
      - main
      - release
    paths:
      - 'BE/**'
      - '.github/workflows/be-ci.yml'

jobs:
  build-test:
    name: Build and test BE
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore SCourt.sln

      - name: Build
        run: dotnet build SCourt.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SCourt.sln --configuration Release --no-build --verbosity normal
